name: Deploy to GitHub Pages

# push 到 main 就自動部署。也可在 Actions 頁面手動觸發。
on:
  push:
    branches: [main]
  workflow_dispatch:

# 給予 Pages 部署所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署,新的 push 會取代排隊中的舊任務
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 把部署當下時間(台灣 UTC+8)寫進程式碼:
      #   - app.js 的 BUILD_TIME → header 顯示「月/日/時」,肉眼確認非 cache
      #   - service-worker.js 的 __BUILD_TIME__ → 快取版本名,每次部署自動失效舊快取
      # 只改上傳用的副本,不 commit 回 repo,免手動維護。
      - name: Stamp build time
        run: |
          STAMP=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')
          SW_STAMP=$(TZ='Asia/Taipei' date '+%Y%m%d-%H%M%S')
          sed -i -E "s/^const BUILD_TIME = \".*\";/const BUILD_TIME = \"$STAMP\";/" app.js
          sed -i "s/__BUILD_TIME__/$SW_STAMP/" service-worker.js
          echo "Stamped BUILD_TIME = $STAMP / SW = $SW_STAMP"
          grep -n 'const BUILD_TIME' app.js
          grep -n 'const BUILD' service-worker.js

      # 純前端、無 build。直接把整個專案當成靜態網站上傳。
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # 若 Pages 尚未啟用,自動啟用(不必先在 Settings 手動開)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
