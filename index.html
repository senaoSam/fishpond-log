<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b7285" />
  <title>魚塭紀錄</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <span id="syncStatus" class="sync-status">連線中…</span>
    <div class="mode-switch" id="modeSwitch" role="group" aria-label="資料模式切換">
      <button type="button" class="mode-opt" data-mode="db">☁️ DB</button>
      <button type="button" class="mode-opt" data-mode="demo">🧪 假資料</button>
    </div>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="切換深色模式" title="切換深色 / 淺色模式">🌙</button>
  </header>

  <main id="main">
    <!-- ========== 記錄頁 ========== -->
    <section id="page-record" class="page active">
      <h2>新增紀錄</h2>

      <!-- 當日(隨日期欄)已記錄清單,點可編輯 -->
      <div id="todayList" class="today-list"></div>

      <form id="recordForm" class="card">
        <label>
          池塘名稱
          <div class="combo">
            <select id="pondSelect"></select>
            <input id="pondInput" type="text" placeholder="或輸入新池塘名稱" autocomplete="off" />
          </div>
        </label>

        <!-- 該池群組:選定池塘後可順便勾選 -->
        <div id="recordTags" class="record-tags" hidden></div>

        <label>
          日期
          <input id="dateInput" type="date" required />
        </label>

        <label>時段</label>
        <div class="seg" id="periodSeg">
          <button type="button" class="seg-btn active" data-period="morning">早上</button>
          <button type="button" class="seg-btn" data-period="afternoon">下午</button>
        </div>

        <label>
          飼料編號
          <select id="feedNoSelect" class="opt-select" data-key="feedNos"></select>
        </label>

        <label>輸入幾包</label>
        <div class="bags-row">
          <div class="stepper">
            <button type="button" class="step-btn" data-step="int" data-dir="-1" aria-label="包數減一">−</button>
            <input id="bagsInt" type="number" inputmode="numeric" min="0" step="1" value="2" aria-label="包數" />
            <button type="button" class="step-btn" data-step="int" data-dir="1" aria-label="包數加一">＋</button>
          </div>
        </div>

        <label>
          拌料(可不選)
          <select id="mixSelect" class="opt-select" data-key="mixes"></select>
        </label>

        <label>
          消毒劑(可不選)
          <select id="disinfectantSelect" class="opt-select" data-key="disinfectants"></select>
        </label>

        <label>
          備註(選填)
          <input id="noteInput" type="text" placeholder="" autocomplete="off" />
        </label>
      </form>
      <p id="recordMsg" class="msg"></p>
    </section>

    <!-- ========== 列表 / 查詢頁 ========== -->
    <section id="page-list" class="page">
      <h2>紀錄查詢</h2>
      <div class="card filters">
        <label>
          月份
          <input id="listMonth" type="month" />
        </label>
        <label>
          群組
          <select id="listTagFilter"><option value="">全部</option></select>
        </label>
        <label>
          池塘
          <select id="listPondFilter"><option value="">全部</option></select>
        </label>
      </div>
      <p class="list-count" id="listCount"></p>
      <div id="listContainer"></div>
    </section>

    <!-- ========== 月統計頁 ========== -->
    <section id="page-stats" class="page">
      <h2>月統計</h2>

      <!-- 總覽 / 單月 切換 -->
      <div class="seg" id="statsModeSeg">
        <button type="button" class="seg-btn active" data-mode="overview">📅 月份總覽</button>
        <button type="button" class="seg-btn" data-mode="single">🔍 單月詳細</button>
      </div>

      <!-- 群組 / 池塘 視角:可疊加篩選 -->
      <div class="card filters">
        <label>
          群組
          <select id="statsTagFilter"><option value="">全部</option></select>
        </label>
        <label>
          池塘
          <select id="statsPondFilter"><option value="">全部</option></select>
        </label>
      </div>

      <!-- 總覽模式才顯示的區間篩選 -->
      <div class="card" id="statsRangeControls">
        <div class="quick-range" id="quickRange">
          <button type="button" class="chip-btn" data-range="3">近 3 個月</button>
          <button type="button" class="chip-btn" data-range="6">近 6 個月</button>
          <button type="button" class="chip-btn" data-range="12">近 12 個月</button>
          <button type="button" class="chip-btn active" data-range="all">全部</button>
        </div>
        <div class="range-inputs">
          <label>從<input id="rangeFrom" type="month" /></label>
          <label>至<input id="rangeTo" type="month" /></label>
        </div>
        <button type="button" class="btn-primary" id="exportRangeBtn">📊 匯出區間 Excel</button>
      </div>

      <!-- 單月模式才顯示的月份選擇 -->
      <div class="card filters" id="statsSingleControls" hidden>
        <label>
          月份
          <input id="statsMonth" type="month" />
        </label>
        <button type="button" class="btn-primary" id="exportBtn">📊 匯出 Excel</button>
      </div>

      <div id="statsOverview"></div>
      <div id="statsContainer"></div>
    </section>

    <!-- ========== 設定頁 ========== -->
    <section id="page-settings" class="page">
      <h2>設定選項</h2>
      <p class="hint">在這裡新增 / 刪除各欄位的固定選項,所有裝置即時同步。</p>
      <div id="settingsContainer"></div>
    </section>
  </main>

  <!-- 跟隨滑鼠的圖表 tooltip -->
  <div id="chartTip" class="chart-tip" hidden></div>

  <!-- 固定儲存列(僅記錄頁顯示,浮在分頁列上方) -->
  <div id="saveBar" class="save-bar">
    <button type="button" class="btn-ghost" id="cancelEditBtn" form="recordForm" hidden>取消編輯</button>
    <button type="submit" class="btn-primary btn-big" id="saveBtn" form="recordForm">儲存紀錄</button>
  </div>

  <!-- ========== 底部導覽列 ========== -->
  <nav class="tabbar">
    <button class="tab active" data-page="record">📝<span>記錄</span></button>
    <button class="tab" data-page="list">📋<span>查詢</span></button>
    <button class="tab" data-page="stats">📊<span>統計</span></button>
    <button class="tab" data-page="settings">⚙️<span>設定</span></button>
  </nav>

  <!-- 自訂確認對話框 -->
  <div id="modalOverlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalText">
      <p id="modalText" class="modal-text"></p>
      <input type="text" id="modalInput" class="modal-input" hidden />
      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="modalCancel">取消</button>
        <button type="button" class="btn-primary" id="modalOk">確定</button>
      </div>
    </div>
  </div>

  <!-- 短訊提示 -->
  <div id="toast" class="toast" hidden></div>

  <!-- SheetJS for Excel export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <!-- App config + logic (ES module) -->
  <script type="module" src="app.js"></script>
</body>
</html>
